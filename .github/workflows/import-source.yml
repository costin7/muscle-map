name: Import muscle-map source

on:
  push:
    paths:
      - muscle-map-source.zip
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract complete source archive
        shell: bash
        run: |
          unzip -o muscle-map-source.zip -d .
          rm muscle-map-source.zip

      - name: Commit imported source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Import complete muscle map source"
          git push
